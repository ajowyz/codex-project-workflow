name: Validate public plugin

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run repository script tests
        run: python -m unittest discover -s scripts -p "test_*.py"

      - name: Validate skill structure
        run: >-
          python .agents/skills/codex-project-workflow/scripts/validate_skill.py
          .agents/skills/codex-project-workflow
          --skill-file plugins/codex-project-workflow/skills/codex-project-workflow/SKILL.md

      - name: Build and validate release package
        run: python scripts/build_plugin_release.py

      - name: Upload validated release package
        uses: actions/upload-artifact@v4
        with:
          name: codex-project-workflow-release
          path: dist/*
          if-no-files-found: error
